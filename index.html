<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Felipe Leiva M. · HOGARDEN</title>
<meta name="description" content="Tarjeta de presentación digital de Felipe Leiva M. — Jefe de Ventas y Trade MKT, HOGARDEN">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,500;9..144,600&family=Manrope:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root{
    --green-deep:#0C3D0C;
    --green:#125B12;
    --green-soft:#2E7A2E;
    --gold:#D9A441;
    --gold-soft:#E9C77E;
    --cream:#F6F3EA;
    --ink:#16231A;
    --muted:#5C6B5C;
  }

  *{box-sizing:border-box;}

  html,body{
    margin:0;
    padding:0;
    min-height:100%;
    background:
      radial-gradient(120% 90% at 50% -10%, var(--green-soft) 0%, var(--green) 42%, var(--green-deep) 100%);
    font-family:'Manrope', sans-serif;
    color:var(--ink);
    -webkit-font-smoothing:antialiased;
  }

  body{
    display:flex;
    align-items:center;
    justify-content:center;
    min-height:100vh;
    padding:56px 18px;
  }

  @media (prefers-reduced-motion: no-preference){
    .card{ animation: rise .6s cubic-bezier(.2,.8,.2,1) both; }
    .logo-wrap{ animation: pop .7s .15s cubic-bezier(.34,1.56,.64,1) both; }
    @keyframes rise{ from{opacity:0; transform:translateY(18px);} to{opacity:1; transform:translateY(0);} }
    @keyframes pop{ from{opacity:0; transform:translateY(6px) scale(.85);} to{opacity:1; transform:translateY(0) scale(1);} }
  }

  .card{
    width:100%;
    max-width:400px;
    background:var(--cream);
    border-radius:26px;
    padding:64px 28px 32px;
    position:relative;
    box-shadow:0 30px 60px -20px rgba(0,0,0,.45), 0 0 0 1px rgba(255,255,255,.06);
  }

  .logo-wrap{
    position:absolute;
    top:-46px;
    left:50%;
    transform:translateX(-50%);
    width:92px;
    height:92px;
    border-radius:50%;
    background:var(--green);
    box-shadow:0 10px 24px -8px rgba(12,61,12,.55), 0 0 0 5px var(--cream);
    display:flex;
    align-items:center;
    justify-content:center;
    overflow:hidden;
  }
  .logo-wrap img{ width:100%; height:100%; object-fit:cover; }

  .identity{ text-align:center; margin-top:6px; }

  .name{
    font-family:'Fraunces', serif;
    font-weight:600;
    font-size:26px;
    letter-spacing:.2px;
    color:var(--ink);
    margin:0 0 4px;
  }

  .role{
    font-size:12.5px;
    font-weight:600;
    letter-spacing:1.6px;
    text-transform:uppercase;
    color:var(--green);
    margin:0 0 3px;
  }

  .company{
    font-size:12px;
    font-weight:600;
    letter-spacing:2px;
    text-transform:uppercase;
    color:var(--muted);
    margin:0;
  }

  /* signature divider: a single leaf-vein rule, echoing the mark in the logo */
  .divider{
    width:100%;
    height:20px;
    margin:22px 0 20px;
    display:block;
  }

  .links{
    display:flex;
    flex-direction:column;
    gap:10px;
  }

  .link-row{
    display:flex;
    align-items:center;
    gap:14px;
    text-decoration:none;
    color:var(--ink);
    background:#fff;
    border:1px solid rgba(18,91,18,.12);
    border-radius:14px;
    padding:13px 16px;
    transition:transform .15s ease, box-shadow .15s ease, border-color .15s ease;
  }
  .link-row:hover, .link-row:focus-visible{
    transform:translateY(-2px);
    box-shadow:0 10px 20px -12px rgba(18,91,18,.35);
    border-color:rgba(18,91,18,.3);
    outline:none;
  }
  .link-row:focus-visible{ outline:2px solid var(--green); outline-offset:2px; }

  .icon{
    flex:0 0 auto;
    width:38px;
    height:38px;
    border-radius:10px;
    background:var(--green);
    display:flex;
    align-items:center;
    justify-content:center;
  }
  .icon svg{ width:19px; height:19px; stroke:var(--cream); fill:none; }

  .link-text{ display:flex; flex-direction:column; min-width:0; }
  .link-label{
    font-size:10.5px;
    font-weight:700;
    letter-spacing:1px;
    text-transform:uppercase;
    color:var(--muted);
  }
  .link-value{
    font-size:14.5px;
    font-weight:600;
    color:var(--ink);
    white-space:nowrap;
    overflow:hidden;
    text-overflow:ellipsis;
  }

  .save-contact{
    margin-top:18px;
    display:flex;
    align-items:center;
    justify-content:center;
    gap:10px;
    width:100%;
    border:none;
    cursor:pointer;
    background:var(--gold);
    color:var(--ink);
    font-family:'Manrope', sans-serif;
    font-weight:700;
    font-size:14.5px;
    letter-spacing:.3px;
    padding:15px 16px;
    border-radius:14px;
    transition:background .15s ease, transform .15s ease;
  }
  .save-contact:hover{ background:var(--gold-soft); transform:translateY(-2px); }
  .save-contact svg{ width:18px; height:18px; stroke:var(--ink); fill:none; }

  .qr-section{
    margin-top:26px;
    padding-top:22px;
    border-top:1px dashed rgba(18,91,18,.25);
    display:flex;
    flex-direction:column;
    align-items:center;
    gap:8px;
  }
  #qrcode{ background:#fff; padding:8px; border-radius:12px; line-height:0; }
  #qrcode img, #qrcode canvas{ display:block; border-radius:4px; }
  .qr-caption{
    font-size:11.5px;
    color:var(--muted);
    letter-spacing:.3px;
    text-align:center;
  }


</style>
</head>
